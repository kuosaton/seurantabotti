name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            httpx \
            anthropic \
            python-dotenv \
            pytest \
            pytest-cov \
            ruff \
            black \
            pylint

      - name: Format check
        run: python -m black --check .

      - name: Ruff
        run: python -m ruff check .

      - name: Pylint
        run: python -m pylint main.py clients delivery processing

      - name: Pytest with coverage reports
        run: |
          python -m pytest -q \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-report=lcov:lcov.info

      - name: Coverage thresholds (line + branch)
        run: |
          python scripts/check_coverage_thresholds.py \
            --file coverage.json \
            --line 95 \
            --branch 90

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.json
            lcov.info
