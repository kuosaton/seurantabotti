minimum_pre_commit_version: '3.6.0'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-format
        args: ['--check']
      - id: ruff-check

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --extra dev pyright
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest (full suite + coverage)
        entry: uv run --extra dev pytest -q --cov=. --cov-report=term-missing --cov-report=json:coverage.json --cov-report=lcov:lcov.info
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: coverage-thresholds
        name: coverage thresholds
        entry: uv run --extra dev python scripts/check_coverage_thresholds.py --file coverage.json --line 95 --branch 90
        language: system
        pass_filenames: false
        stages: [pre-push]
