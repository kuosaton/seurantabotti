[project]
name = "seurantabotti"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "anthropic>=0.40",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
sprint4 = [
    "pymupdf>=1.24",
    "python-docx>=1.1",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.8",
    "black>=24.0",
    "pylint>=3.2",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.coverage.run]
branch = true

[tool.pylint.main]
py-version = "3.12"
ignore = [".venv", "__pycache__"]

[tool.pylint.messages_control]
disable = [
    "line-too-long",
    "wrong-import-position",
    "import-outside-toplevel",
    "too-many-locals",
    "too-many-branches",
    "too-many-statements",
    "too-many-arguments",
    "too-many-positional-arguments",
    "broad-exception-caught",
    "unused-argument",
    "import-error",
    "no-name-in-module",
    "missing-module-docstring",
    "missing-function-docstring",
    "missing-class-docstring",
    "too-few-public-methods",
]
